name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: Publish as draft
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            name: Windows
          - platform: ubuntu-22.04
            name: Linux

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build

      - name: Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Windows code signing (SignPath Foundation) ────────────────────────
          # Uncomment once SignPath Foundation approves the project.
          # Docs: https://about.signpath.io/product/open-source
          # SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        with:
          tauriScript: "echo"
          tagName: ${{ github.ref_name }}
          releaseName: Eve Nexus __VERSION__
          releaseBody: |
            ## Eve Nexus __VERSION__

            **Windows:** Download `Eve.Nexus___VERSION___x64-setup.exe`
            **Linux:** Download the `.AppImage`, `.deb`, or `.rpm` for your distro

            ---
            > First time? Windows may show a SmartScreen prompt — click **More info → Run anyway**.
            > This will go away once code signing is in place.
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || true }}
          prerelease: false
